<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Decision App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>BTC Decision App</h1>

    <section class="card">
      <div class="row">
        <span class="pill" id="price">가격: -</span>
        <span class="pill" id="signal">신호: -</span>
        <span class="pill" id="rr">RR: -</span>
        <span class="pill" id="source">source: -</span>
        <button id="refresh">새로고침</button>
      </div>
      <p id="reason">근거: -</p>
      <p class="muted" id="box">VAL/MID/VAH: -</p>
    </section>

    <section class="card">
      <h3>리스크 가드레일</h3>
      <div id="guardrails">로딩 중...</div>
      <div class="row top-gap">
        <input id="dailyLossLimit" type="number" placeholder="일손실한도(USD)" />
        <input id="maxConsecutiveLosses" type="number" placeholder="최대 연속손실" />
        <input id="maxOpenTrades" type="number" placeholder="최대 동시포지션" />
        <button id="saveRisk">리스크 설정 저장</button>
      </div>
    </section>

    <section class="card">
      <h3>전략 프로필</h3>
      <div class="row">
        <select id="strategyId"></select>
        <input id="newStrategyName" type="text" placeholder="새 전략 이름" />
        <input id="newStrategyRR" type="number" step="0.1" placeholder="최소 RR" />
        <button id="addStrategy">전략 추가</button>
      </div>
    </section>

    <section class="card">
      <h3>포지션 시작</h3>
      <div class="row">
        <select id="side"><option>LONG</option><option>SHORT</option></select>
        <input id="entry" type="number" placeholder="Entry" />
        <input id="sl" type="number" placeholder="SL" />
        <input id="tp" type="number" placeholder="TP" />
        <input id="notes" type="text" placeholder="전략 메모" />
        <button id="openTrade">포지션 시작</button>
      </div>
      <p class="muted">OPEN 포지션 선택 후 SL/익절/청산 이벤트를 기록하세요.</p>
    </section>

    <section class="card">
      <h3>포지션 운영</h3>
      <div class="row">
        <select id="activeTrade"></select>
        <button id="slUp">SL +50</button>
        <button id="slDown">SL -50</button>
        <button id="takeProfit">부분익절(25%)</button>
        <button id="closeTrade">청산</button>
      </div>
    </section>

    <section class="card">
      <h3>타임라인</h3>
      <table>
        <thead><tr><th>시간</th><th>이벤트</th><th>메모</th><th>가격</th></tr></thead>
        <tbody id="timeline"></tbody>
      </table>
    </section>

    <section class="card">
      <h3>복기 지표</h3>
      <div id="review">로딩 중...</div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
